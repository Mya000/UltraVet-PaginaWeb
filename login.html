<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - UltraVet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center justify-content-center" style="height:100vh; background:#fafafa;">

<div class="card p-4 shadow" style="width:360px;">

    <!-- Título -->
    <h3 class="text-center mb-3" id="titulo">Iniciar Sesión</h3>

    <!-- LOGIN -->
    <form id="loginForm">
        <input type="text" id="loginUser" class="form-control mb-3" placeholder="Usuario" required>
        <input type="password" id="loginPass" class="form-control mb-3" placeholder="Contraseña" required>
        <button class="btn btn-hero w-100">Ingresar</button>
    </form>

    <!-- REGISTRO -->
    <form id="registerForm" style="display:none;">
        <input type="text" id="regUser" class="form-control mb-3" placeholder="Usuario" required>
        <input type="password" id="regPass" class="form-control mb-3" placeholder="Contraseña" required>
        <button class="btn btn-success w-100">Registrarse</button>
    </form>

    <!-- MENSAJE -->
    <p id="mensaje" class="text-center mt-3 text-danger" style="display:none;"></p>

    <!-- BOTÓN CAMBIO -->
    <div class="text-center mt-3">
        <button onclick="cambiarModo()" class="btn btn-link" id="toggleBtn">
            ¿No tienes cuenta? Regístrate
        </button>
    </div>

</div>

<script src="login.js"></script>

</body>
</html>
